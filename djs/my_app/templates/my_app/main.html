{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static '/my_app/css/main.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <aside>
        <img src="{% static 'my_app/img/2.png' %}">
        <span class="logo">Everything For Ride</span>
        <h3>Навігація</h3>
        <ul>
            <a href="{% url 'home' %}">
                <li><i class="fa-regular fa-house"></i>Головна</li>
            </a>
            <a href="{% url 'catalog' %}">
                <li><i class="fa-solid fa-list"></i>Каталог</li>
            </a>
            <a href="{% url 'users_hub' %}">
                <li><i class="fa-regular fa-comments"></i>Коментарі</li>
            </a>
            <a href="{% url 'about' %}">
                <li><i class="fa-solid fa-newspaper"></i>Про нас</li>
            </a>
        </ul>
    </aside>
    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>

</html>
