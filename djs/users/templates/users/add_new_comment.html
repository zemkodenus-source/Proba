{% extends 'my_app/main.html' %}

{% block title %}Головна сторінка{% endblock %}

{% block content %}
<div class="features">
    <h1>Добавити коментар</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.title }}<br>
        {{ form.about }}<br>
        {{ form.full_text }}<br>
        {{ form.data }}<br>



        # старий зразок коду


        <input type="text" placeholder="Користувач" class="form-control"><br>
        <input type="text" placeholder="Опис" class="form-control"><br>
        <textarea class="form-control" placeholder="Повний коментар"></textarea>
        <input type="date" class="form-control"><br>
        <input type="time" class="form-control"><br>
        <button class="btn btn-success" type="submit">Додати коментар</button>
    </form>
</div>
{% endblock %}
