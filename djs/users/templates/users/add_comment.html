{% extends 'my_app/main.html' %}

{% block title %}Добавити коментар{% endblock %}

{% block content %}
<div class="features">
    <h1>Добавити коментар</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.title }}<br>
        {{ form.about }}<br>
        {{ form.full_text }}<br>
        {{ form.data }}<br>

        <button class="btn btn-success" type="submit">Додати коментар</button>
    </form>
</div>
{% endblock %}
